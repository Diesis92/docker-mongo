version: "3.8"

services:
  mongodb:
    image: ${MONGO_IMAGE:-mongo:7}
    container_name: ${MONGO_CONTAINER_NAME:-mongodb}

    restart: ${MONGO_RESTART_POLICY:-unless-stopped}

    ports:
      - "${MONGO_PORT:-27017}:27017"

    environment:
      #######################################
      # ROOT USER
      #######################################
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}

      #######################################
      # INITIAL DATABASE
      #######################################
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-appdb}

      #######################################
      # TZ
      #######################################
      TZ: ${TZ:-Europe/Rome}

    volumes:
      #######################################
      # DATABASE DATA
      #######################################
      - ./data:/data/db

      #######################################
      # INTERNAL CONFIG DATABASE
      #######################################
      - ./configdb:/data/configdb

      #######################################
      # INIT SCRIPTS
      #######################################
      - ./init:/docker-entrypoint-initdb.d:ro

      #######################################
      # BACKUP FOLDER
      #######################################
      - ./backups:/backups

    networks:
      - mongo-network

    #######################################
    # HEALTHCHECK
    #######################################
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    #######################################
    # OPTIONAL CUSTOM COMMANDS
    #######################################
    # command: ["--auth"]

    #######################################
    # OPTIONAL RESOURCE LIMITS
    #######################################
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1"
    #       memory: 1G

    #######################################
    # OPTIONAL LOGGING CONFIG
    #######################################
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"

  mongo-express:
    image: ${MONGO_EXPRESS_IMAGE:-mongo-express:latest}
    container_name: ${MONGO_EXPRESS_CONTAINER_NAME:-mongo-express}

    restart: ${MONGO_EXPRESS_RESTART_POLICY:-unless-stopped}

    depends_on:
      mongodb:
        condition: service_healthy

    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"

    environment:
      #######################################
      # CONNECTION TO MONGODB
      #######################################
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-password123}

      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017

      #######################################
      # BASIC AUTH FOR GUI
      #######################################
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-express}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-express123}

      #######################################
      # OPTIONAL SETTINGS
      #######################################
      # ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      # ME_CONFIG_OPTIONS_EDITORTHEME: "default"
      # ME_CONFIG_SITE_COOKIESECRET: "cookie-secret"
      # ME_CONFIG_SITE_SESSIONSECRET: "session-secret"

      TZ: ${TZ:-Europe/Rome}

    networks:
      - mongo-network

networks:
  mongo-network:
    driver: bridge
