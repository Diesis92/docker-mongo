version: "3.8"

services:
  mongodb:
    image: ${MONGO_IMAGE:-mongo:7}
    container_name: ${MONGO_CONTAINER_NAME:-mongodb}

    restart: ${MONGO_RESTART_POLICY:-unless-stopped}

    ports:
      - "${MONGO_PORT:-27017}:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-appdb}
      TZ: ${TZ:-Europe/Rome}

    volumes:
      - mongo_data:/data/db
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups

    networks:
      - mongo-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: ${MONGO_EXPRESS_IMAGE:-mongo-express:latest}
    container_name: ${MONGO_EXPRESS_CONTAINER_NAME:-mongo-express}

    restart: ${MONGO_EXPRESS_RESTART_POLICY:-unless-stopped}

    depends_on:
      mongodb:
        condition: service_healthy

    ports:
      - "${MONGO_EXPRESS_PORT:-8082}:8081"

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017

      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-express}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-express123}

      TZ: ${TZ:-Europe/Rome}

    networks:
      - mongo-network

networks:
  mongo-network:
    driver: bridge

volumes:
  mongo_data: